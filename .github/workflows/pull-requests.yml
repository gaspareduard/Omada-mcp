name: Pull Request

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "tests/**"
      - "*.json"
      - "*.ts"
      - ".github/workflows/*.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIN_COVERAGE_THRESHOLD: ${{ vars.MIN_COVERAGE_THRESHOLD || '80' }}

jobs:
  build-and-lint:
    name: Build and Check Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          # Set npm cache to expire after 15 days
          npm_config_cache_max: 1296000

      - name: Build project
        run: npm run build

      - name: Check code style
        run: npm run check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 15

      - name: Check coverage thresholds
        run: |
          # Parse coverage summary
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "
              const fs = require('fs');
              const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = summary.total;
              console.log(JSON.stringify({
                lines: total.lines.pct,
                statements: total.statements.pct,
                functions: total.functions.pct,
                branches: total.branches.pct
              }));
            ")
            
            echo "Coverage Summary:"
            echo "$COVERAGE" | node -e "
              const coverage = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
              console.log('Lines: ' + coverage.lines + '%');
              console.log('Statements: ' + coverage.statements + '%');
              console.log('Functions: ' + coverage.functions + '%');
              console.log('Branches: ' + coverage.branches + '%');
            "
            
            # Check if coverage meets minimum thresholds
            node -e "
              const coverage = $COVERAGE;
              const minCoverage = parseInt(process.env.MIN_COVERAGE_THRESHOLD) || 80;
              
              let failed = false;
              
              if (coverage.lines < minCoverage) {
                console.error('❌ Line coverage (' + coverage.lines + '%) is below ' + minCoverage + '%');
                failed = true;
              }
              if (coverage.statements < minCoverage) {
                console.error('❌ Statement coverage (' + coverage.statements + '%) is below ' + minCoverage + '%');
                failed = true;
              }
              if (coverage.functions < minCoverage) {
                console.error('❌ Function coverage (' + coverage.functions + '%) is below ' + minCoverage + '%');
                failed = true;
              }
              if (coverage.branches < minCoverage) {
                console.error('❌ Branch coverage (' + coverage.branches + '%) is below ' + minCoverage + '%');
                failed = true;
              }
              
              if (failed) {
                console.error('\\n❌ Coverage check failed! Minimum coverage threshold is ' + minCoverage + '%');
                process.exit(1);
              } else {
                console.log('\\n✅ All coverage thresholds met!');
              }
            "
          else
            echo "❌ Coverage summary not found!"
            exit 1
          fi
