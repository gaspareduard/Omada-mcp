name: Pull Request

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "tests/**"
      - "*.json"
      - "*.ts"
      - ".github/workflows/*.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Build and Check Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          # Set npm cache to expire after 15 days
          npm_config_cache_max: 1296000

      - name: Build project
        run: npm run build

      - name: Check code style
        run: npm run check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check global coverage thresholds
        run: |
          node -e "
            const s = require('./coverage/coverage-summary.json').total;
            const min = { lines: 90, statements: 90, functions: 90, branches: 70 };
            let failed = false;
            for (const [k, threshold] of Object.entries(min)) {
              const pct = s[k].pct;
              if (pct < threshold) {
                console.error('❌ ' + k + ' coverage ' + pct + '% is below ' + threshold + '%');
                failed = true;
              } else {
                console.log('✅ ' + k + ': ' + pct + '%');
              }
            }
            if (failed) process.exit(1);
          "

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 15

