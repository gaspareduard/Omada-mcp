name: Notify Krennic on Copilot review

on:
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    if: github.event.review.user.login == 'copilot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Krennic via OpenClaw hooks
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          REVIEW_STATE="${{ github.event.review.state }}"

          curl -sf -X POST "${{ secrets.OPENCLAW_GATEWAY_URL }}/hooks/agent" \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_HOOKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"agentId\": \"krennic\",
              \"message\": \"🤖 Copilot review on PR #${PR_NUMBER}: **${PR_TITLE}**\\nState: \`${REVIEW_STATE}\`\\n${PR_URL}\\n\\nNew review threads to resolve.\",
              \"deliver\": true,
              \"channel\": \"discord\"
            }"
