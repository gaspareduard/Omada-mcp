name: Cleanup Old Caches

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    name: Delete Old Caches
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup old caches
        run: |
          echo "Fetching caches older than 15 days..."

          # Calculate date 15 days ago
          cutoff_date=$(date -u -d '15 days ago' +%Y-%m-%dT%H:%M:%SZ)

          # Get all caches
          caches=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/actions/caches" \
            --paginate \
            --jq '.actions_caches[]')

          echo "Found $(echo "$caches" | jq -s 'length') total caches"

          # Filter and delete old caches
          echo "$caches" | jq -c "select(.created_at < \"$cutoff_date\")" | while read -r cache; do
            cache_id=$(echo "$cache" | jq -r '.id')
            cache_key=$(echo "$cache" | jq -r '.key')
            created_at=$(echo "$cache" | jq -r '.created_at')
            
            echo "Deleting cache: $cache_key (ID: $cache_id, Created: $created_at)"
            
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/actions/caches/$cache_id" || true
          done

          echo "Cache cleanup completed"
        env:
          GH_TOKEN: ${{ github.token }}
