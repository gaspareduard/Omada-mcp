name: Integrity checks

on:
  push:
    branches:
      - main
      - develop

jobs:
  integrity:
    name: Symlink & repo integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check AI instruction symlinks
        run: |
          FAIL=0
          for link in AGENTS.md .github/copilot-instructions.md .github/AGENTS.md; do
            if [ ! -L "$link" ]; then
              echo "❌ $link is missing or not a symlink"
              FAIL=1
            else
              target=$(readlink "$link")
              resolved=$(realpath "$link" 2>/dev/null || true)
              if [ ! -f "$resolved" ]; then
                echo "❌ $link -> $target (broken — target does not exist)"
                FAIL=1
              else
                echo "✅ $link -> $target"
              fi
            fi
          done
          if [ $FAIL -ne 0 ]; then
            echo ""
            echo "Fix: run 'npm run symlinks:fix' locally and commit the result."
          fi
          exit $FAIL
